<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini食堂</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        #container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1b5e20; text-align: center; margin-top: 0; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
        #ask-btn { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #recipe-result { margin-top: 20px; white-space: pre-wrap; line-height: 1.6; border-top: 2px dashed #eee; padding-top: 15px; }
        #settings-btn { position: fixed; top: 15px; right: 15px; background: #fff; border: 1px solid #ddd; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 1.2rem; }
        #settings-panel { display: none; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #2e7d32; }
    </style>
</head>
<body>

<button id="settings-btn" onclick="toggleSettings()">⚙</button>

<div id="container">
    <div id="settings-panel">
        <label style="font-weight: bold; font-size: 0.8rem;">APIキーを設定</label>
        <input type="password" id="api-key-input" placeholder="ここに貼り付け">
        <button onclick="saveKey()" style="width:100%; padding:10px; background:#2e7d32; color:white; border:none; border-radius:8px;">キーを保存</button>
    </div>

    <h1>🍳 Gemini食堂</h1>
    <p style="text-align:center; color:#666; font-size:0.9rem;">5人前・魚優先レシピをご提案</p>
    
    <input type="text" id="ingredients" placeholder="食材（例：サバ、玉ねぎ）">
    <button id="ask-btn" onclick="askGemini()">シェフに相談する</button>

    <div id="loading" style="display:none; text-align:center; margin:20px; font-weight:bold; color:#2e7d32;">考え中...</div>
    <div id="recipe-result"></div>
</div>

<script>
    let API_KEY = localStorage.getItem('gemini_kitchen_key') || "";

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function saveKey() {
        const k = document.getElementById('api-key-input').value.trim();
        if(k) {
            localStorage.setItem('gemini_kitchen_key', k);
            API_KEY = k;
            alert("キーを保存しました。");
            toggleSettings();
        }
    }

    async function askGemini() {
        if (!API_KEY) { alert("⚙からキーを設定してください"); toggleSettings(); return; }
        const input = document.getElementById('ingredients').value;
        if (!input) return;

        const btn = document.getElementById('ask-btn');
        const loader = document.getElementById('loading');
        const resultDiv = document.getElementById('recipe-result');

        btn.disabled = true;
        loader.style.display = "block";
        resultDiv.innerText = "";

        // 5人家族、魚優先のプロンプト
        const promptText = `5人家族向けの夕食レシピを1つ提案してください。食材: ${input}。肉と魚があるなら魚をメインに。分量は5人分。最後に合うお酒を教えて。`;

        try {
            // 最も安定している gemini-1.5-flash を使用
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            if (data.candidates && data.candidates[0].content) {
                resultDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("レシピを生成できませんでした。");
            }
        } catch (e) {
            alert("エラーが発生しました: " + e.message);
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
