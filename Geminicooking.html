<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini食堂 - 5人前レシピ提案</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; padding-bottom: 80px; }
        #container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { font-size: 1.6rem; color: #1b5e20; text-align: center; margin-top: 0; }
        
        /* 設定エリア */
        #settings-btn { position: fixed; top: 15px; right: 15px; background: #fff; border: 1px solid #ddd; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; z-index: 100; font-size: 1.2rem; }
        #settings-panel { display: none; background: #eee; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #2e7d32; }
        
        .chef-comment { font-style: italic; color: #555; font-size: 0.95rem; margin-bottom: 20px; border-left: 5px solid #2e7d32; padding-left: 12px; line-height: 1.4; }
        
        input[type="text"], input[type="password"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }
        
        #ask-btn { 
            width: 100%; padding: 18px; background-color: #2e7d32; color: white; border: none; 
            border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1b5e20;
        }
        #ask-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b5e20; }
        #ask-btn:disabled { background-color: #ccc; box-shadow: none; }

        #recipe-result { margin-top: 25px; white-space: pre-wrap; line-height: 1.7; border-top: 2px dashed #eee; padding-top: 20px; display: none; font-size: 1rem; }
        .loading { text-align: center; display: none; margin: 30px 0; font-weight: bold; color: #2e7d32; }
        
        .key-status { font-size: 0.8rem; margin-top: 5px; color: #d32f2f; }
        .key-ok { color: #2e7d32; }
    </style>
</head>
<body>

<button id="settings-btn" onclick="toggleSettings()">⚙</button>

<div id="container">
    <div id="settings-panel">
        <label style="font-size: 0.8rem; font-weight: bold;">Gemini APIキー設定</label>
        <input type="password" id="api-key-input" placeholder="ここにAPIキーを貼り付け">
        <button onclick="saveKey()" style="background:#2e7d32; color:white; border:none; padding:8px; border-radius:8px; width:100%;">キーを保存</button>
        <div id="key-msg" class="key-status">キーが設定されていません</div>
    </div>

    <h1>🍳 Gemini食堂</h1>
    <div class="chef-comment">「今日ある食材を教えてください。5人分、娘さんの分もバッチリ考えますよ。」</div>
    
    <input type="text" id="ingredients" placeholder="例：サバ、大根、味噌">
    <button id="ask-btn" onclick="askGemini()">本日の献立を相談</button>

    <div id="loading" class="loading">👨‍🍳 シェフが腕を振るっています...</div>
    <div id="recipe-result"></div>
</div>

<script>
    let API_KEY = localStorage.getItem('gemini_kitchen_key') || "";

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function saveKey() {
        const key = document.getElementById('api-key-input').value.trim();
        if(key) {
            localStorage.setItem('gemini_kitchen_key', key);
            API_KEY = key;
            alert("キーを保存しました。");
            checkKey();
            toggleSettings();
        }
    }

    function checkKey() {
        const msg = document.getElementById('key-msg');
        if(API_KEY) {
            msg.innerText = "✅ APIキー設定済み";
            msg.className = "key-status key-ok";
        }
    }

    async function askGemini() {
        if (!API_KEY) {
            alert("右上の⚙からAPIキーを設定してください。");
            toggleSettings();
            return;
        }
        const input = document.getElementById('ingredients').value;
        if (!input) return alert("食材を入力してください！");

        const btn = document.getElementById('ask-btn');
        const loader = document.getElementById('loading');
        const resultDiv = document.getElementById('recipe-result');

        btn.disabled = true;
        loader.style.display = "block";
        resultDiv.style.display = "none";

        const prompt = `あなたはプロの料理研究家です。
以下の食材を使って、5人家族向けの夕食レシピを1つ提案してください。
【食材】: ${input}

条件：
・5人分の分量（多め）で記載すること。
・もし食材に「肉」と「魚」がある場合は、魚をメインにした料理にすること（娘が魚好きのため）。
・調理工程はステップ形式で簡潔に。
・最後に「本日のシェフの一言」と、その料理に合う「おすすめのお酒」を1つ添えてください。`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            
            const recipe = data.candidates[0].content.parts[0].text;
            resultDiv.innerText = recipe;
            resultDiv.style.display = "block";
        } catch (error) {
            alert("エラー: " + error.message);
            resultDiv.innerText = "レシピの取得に失敗しました。キーを確認してください。";
            resultDiv.style.display = "block";
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
    checkKey();
</script>

</body>
</html>
